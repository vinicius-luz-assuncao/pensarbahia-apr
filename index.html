<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pensar Bahia — Sistema de Estrutura Logística</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div id="image-viewer" class="image-viewer" style="display:none">
  <div class="iv-header">
    <span class="iv-title" id="iv-title"></span>
    <button id="iv-close" class="iv-close">&times;</button>
  </div>
  <div class="iv-body">
    <img id="iv-image" src="" alt="">
  </div>
</div>

<!-- ====== SIDEBAR ====== -->
<div id="sidebar" class="sidebar">
  <div class="sidebar-header">
    <span>Camadas</span>
    <button id="sidebar-close" class="sidebar-close">&times;</button>
  </div>
  <div class="sidebar-content" id="layer-controls"></div>
</div>
<div id="sidebar-overlay" class="sidebar-overlay"></div>

<!-- ====== MAPA ====== -->
<div class="map-page">
  <div class="map-header">
    <h2>Infraestrutura Logística da Bahia</h2>
    <button id="sidebar-toggle" class="sidebar-toggle">&#9654;</button>
    <div class="base-toggles">
      <button class="layer-btn base active" data-baselayer="mapa">&#x1F5FA;</button>
      <button class="layer-btn base" data-baselayer="satelite">&#x1F4F7;</button>
    </div>
  </div>

  <div id="info-bar" class="info-bar"></div>

  <div class="map-container-wrapper">
    <div id="map-container"></div>
    <div id="map-loading">
      <div class="spinner"></div>
      <div class="load-text">Carregando mapa interativo...</div>
    </div>
  </div>
</div>

<!-- ============================================================
     SCRIPTS
     ============================================================ -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="js/layers-config.js"></script>
<script src="js/map-data.js"></script>
<script src="js/map-controller.js"></script>
</body>
</html>
